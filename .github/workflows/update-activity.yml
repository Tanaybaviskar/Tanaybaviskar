name: Update GitHub Activity

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Fetch and Format Activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch ONLY the last 2 coding events
          gh api /users/Tanaybaviskar/events/public \
            --jq '[.[] | select(.type=="PushEvent" or .type=="PullRequestEvent" or .type=="IssuesEvent" or .type=="CreateEvent")] | .[0:2] | map("- \(.type) on `\(.repo.name)`") | join("\n")' > activity.md
          
          # Rename events to human readable text
          sed -i 's/PushEvent/Pushed code/g' activity.md
          sed -i 's/PullRequestEvent/Opened PR/g' activity.md
          sed -i 's/IssuesEvent/Opened issue/g' activity.md
          sed -i 's/CreateEvent/Created repo\/branch/g' activity.md
          
      - name: Inject Safely into README
        run: |
          python -c "
          import re
          with open('README.md', 'r') as f: content = f.read()
          with open('activity.md', 'r') as f: activity = f.read().strip()
          # This regex strictly replaces ONLY what is between the two tags
          new_content = re.sub(r'.*?', f'\n{activity}\n', content, flags=re.DOTALL)
          with open('README.md', 'w') as f: f.write(new_content)
          "
          rm activity.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "⚡ auto-update: system logs" || echo "No new activity to commit"
          git push
