name: Update GitHub Activity README

on:
  schedule:
    - cron: "0 */12 * * *" # This tells it to run automatically every 12 hours
  workflow_dispatch: # This allows you to click a button and run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    name: Update this repo's README with recent activity

    steps:
      - uses: actions/checkout@v3
      - uses: jamesgeorge1/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "⚡ auto-update: recent activity logs"
          MAX_LINES: 5
